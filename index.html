var map = new naver.maps.Map('map', { center: new naver.maps.LatLng(34.85, 127.70), zoom: 11 });
var markers = [];
var infoWindows = [];
var myLocationMarker = null;

function makeContactHtml(contacts) {
    return contacts.map(c => `
        <div class="contact-item">
            <span class="contact-name">${c.n}</span>
            ${c.p ? `<a href="tel:${c.p}" class="tel-link">${c.p}</a>` : `<span style="color:#ccc; font-size:12px;">번호없음</span>`}
        </div>
    `).join('');
}

function initMarkers() {
    businessData.forEach(function(item) {
        naver.maps.Service.geocode({ query: item.addr }, function(status, response) {
            if (status !== naver.maps.Service.Status.OK || response.v2.addresses.length === 0) return;
            var res = response.v2.addresses[0];
            var point = new naver.maps.LatLng(res.y, res.x);
            var marker = new naver.maps.Marker({
                position: point, map: map,
                icon: { content: '<div class="custom-marker">' + item.short + '</div>', anchor: new naver.maps.Point(15, 15) }
            });

           var infowindow = new naver.maps.InfoWindow({
                content: `
                    <div class="info-window">
                        <div class="close-window-btn" onclick="closeAllInfo()">×</div>
                        <div class="info-title">${item.name}</div>
                        <div class="contact-list">${makeContactHtml(item.contacts)}</div>
                        
                        <div style="font-size: 12px; color: #333; background: #f0f0f0; padding: 8px; border-radius: 5px; margin-bottom: 5px; word-break: keep-all;">
                            ${item.addr}
                        </div>

                        <div class="addr-text" onclick="window.copyAddr('${item.addr}')">📋 주소 복사</div>
                        <button class="navi-btn" onclick="window.startNavi('${res.x}', '${res.y}', '${item.name}')">카카오내비 길안내</button>
                    </div>`,
                borderWidth: 0, backgroundColor: "transparent", disableAnchor: true, pixelOffset: new naver.maps.Point(0, -10)
            });

            naver.maps.Event.addListener(marker, "click", function() {
                closeAllInfo();
                infowindow.open(map, marker);
            });
            markers.push({ mObj: marker, searchString: (item.name + item.short + item.addr).toLowerCase() });
            infoWindows.push(infowindow);
        });
    });
}

function closeAllInfo() { infoWindows.forEach(iw => iw.close()); }

function doSearch() {
    closeAllInfo();
    var val = document.getElementById('search-input').value.trim().toLowerCase();
    if (!val) { markers.forEach(m => m.mObj.setMap(map)); return; }
    var keywords = val.split('.').map(k => k.trim()).filter(k => k.length > 0);
    markers.forEach(function(m) {
        var isMatch = keywords.some(k => m.searchString.indexOf(k) !== -1);
        m.mObj.setMap(isMatch ? map : null);
    });
}

function findMyLocation() {
    if (!navigator.geolocation) { alert("위치 기능을 사용할 수 없습니다."); return; }
    navigator.geolocation.getCurrentPosition(function(position) {
        var lat = position.coords.latitude;
        var lng = position.coords.longitude;
        var currentPos = new naver.maps.LatLng(lat, lng);
        if (!myLocationMarker) {
            myLocationMarker = new naver.maps.Marker({
                position: currentPos, map: map,
                icon: { content: '<div class="my-location-marker"></div>', anchor: new naver.maps.Point(11, 11) },
                zIndex: 100
            });
        } else { myLocationMarker.setPosition(currentPos); }
        map.panTo(currentPos);
        if (map.getZoom() < 14) map.setZoom(14);
    }, function() { alert("위치 정보를 가져올 수 없습니다."); }, { enableHighAccuracy: false, timeout: 8000 });
}

window.copyAddr = function(text) {
    var t = document.createElement("textarea"); document.body.appendChild(t); t.value = text; t.select();
    document.execCommand('copy'); document.body.removeChild(t);
    alert("주소가 복사되었습니다.");
};

window.startNavi = function(x, y, name) {
    location.href = "nmap://navigation?dlat=" + y + "&dlng=" + x + "&dname=" + encodeURIComponent(name) + "&appname=heoara-odd.github.io";
};

naver.maps.Event.once(map, 'init_stylemap', function() { initMarkers(); });

document.getElementById('search-btn').onclick = doSearch;
document.getElementById('close-btn').onclick = closeAllInfo;
document.getElementById('reset-btn').onclick = function() { document.getElementById('search-input').value = ""; closeAllInfo(); doSearch(); };
document.getElementById('mylocation-btn').onclick = findMyLocation;
document.getElementById('search-input').onkeypress = function(e) { if (e.keyCode == 13) doSearch(); };
</script>
